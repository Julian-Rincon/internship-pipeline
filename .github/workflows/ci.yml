name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: internship_pipeline_test
          POSTGRES_USER: internship
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"
        working-directory: backend

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://internship:test-password@localhost:5432/internship_pipeline_test
        run: alembic upgrade head
        working-directory: backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://internship:test-password@localhost:5432/internship_pipeline_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v --tb=short
        working-directory: backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check app/ --select=E,F,W --ignore=E501
        working-directory: backend
