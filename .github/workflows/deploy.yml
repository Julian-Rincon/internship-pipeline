name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger deploy webhook
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","repo":"internship-pipeline"}'

      - name: Skip (webhook not configured)
        if: ${{ secrets.DEPLOY_WEBHOOK_URL == '' }}
        run: echo "DEPLOY_WEBHOOK_URL secret not set — skipping. Add it in repo Settings → Secrets to enable auto-deploy."
