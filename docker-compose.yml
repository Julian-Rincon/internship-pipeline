services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-internship_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-internship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-internship} -d ${POSTGRES_DB:-internship_pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://internship:change-me-local-only@postgres:5432/internship_pipeline}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app:z
      - ./backend/alembic:/app/alembic:z
      - ./backend/tests:/app/tests:z
      - ./scripts:/app/scripts:z
      - ./backend/alembic.ini:/app/alembic.ini:z

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:z
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-local-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change-me-local-only}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-a-local-random-string}
      DB_SQLITE_POOL_SIZE: 2
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      JARVIS_TELEGRAM_BOT_TOKEN: ${JARVIS_TELEGRAM_BOT_TOKEN:-}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:z
    depends_on:
      - backend

  # Uptime Kuma — optional monitoring UI at :3002
  # Start with: docker compose --profile monitoring up -d
  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: [monitoring]
    ports:
      - "3002:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
  frontend-next-cache:
  n8n-data:
  uptime-kuma-data:
